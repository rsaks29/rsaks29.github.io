<!DOCTYPE html>
<html>
<head>
    <title>My Resume</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #f8fafc;
            min-height: 100vh;
        }

        .page-wrapper {
            width: min(1100px, 90%);
            margin: 0 auto;
            padding: 40px 0 70px;
        }

        .hero {
            text-align: center;
            padding: 70px 20px 45px;
        }

        .hero h1 {
            margin: 0;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            letter-spacing: 4px;
        }

        .hero p {
            max-width: 650px;
            margin: 18px auto 0;
            color: #cbd5e1;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        nav {
            display: flex;
            justify-content: center;
            margin-bottom: 55px;
        }

        .Menu {
            position: relative;
        }

        .dropdown-btn {
            background: rgba(255, 255, 255, 0.12);
            color: #f8fafc;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 999px;
            padding: 13px 24px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            font-size: 0.95rem;
            transition: transform 0.25s ease, background 0.25s ease;
        }

        .dropdown-btn:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.2);
        }

        .dropdown-list {
            list-style: none;
            padding: 10px;
            margin: 12px 0 0;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            min-width: 190px;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 18px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
            display: none;
            z-index: 10;
        }

        .Menu:hover .dropdown-list {
            display: block;
        }

        .dropdown-list li a {
            display: block;
            color: #e2e8f0;
            text-decoration: none;
            padding: 11px 14px;
            border-radius: 12px;
            transition: background 0.2s ease;
        }

        .dropdown-list li a:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .resume-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 24px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.25);
            padding: 24px;
            overflow: hidden;
        }

        .embed-container {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        iframe {
            width: 100%;
            max-width: 850px;
            height: 2000px;
            border: none;
            border-radius: 18px;
            background: #ffffff;
        }

        .back-link-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 35px;
        }

        .back-link {
            display: inline-block;
            background: rgba(255, 255, 255, 0.12);
            color: #f8fafc;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 999px;
            padding: 13px 24px;
            text-decoration: none;
            transition: transform 0.25s ease, background 0.25s ease;
        }

        .back-link:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 600px) {
            .hero {
                padding-top: 45px;
            }

            .resume-card {
                padding: 14px;
            }

            iframe {
                height: 1600px;
            }
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <section class="hero">
            <h1>Resume</h1>
            <p>A quick overview of my background, skills, and experience.</p>
        </section>

        <nav>
            <div class="Menu">
                <button class="dropdown-btn">Explore Website</button>
                <ul class="dropdown-list">
                    <li><a href="index.html">Main</a></li>
                    <li><a href="AboutMe.html">About me</a></li>
                    <li><a href="Projects.html">Projects</a></li>
                    <li><a href="HowToContactMe.html">Contact</a></li>
                </ul>
            </div>
        </nav>

        <div class="resume-card">
            <div class="embed-container">
                <iframe src="https://docs.google.com/document/d/e/2PACX-1vQCahdAfTdpbcENMJt1bL3jkLchs4UjFUbeTq93mqOs0ETTUwTWu-oLtBuVJ62-GKEAk3b_OpINFS4w/pub?embedded=true"></iframe>
            </div>
        </div>

        <div class="back-link-wrapper">
            <a class="back-link" href="AboutMe.html">Back to About Me</a>
        </div>
    </div>
</body>
</html>
