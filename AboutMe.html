<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>About Me</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: #f8fafc;
        min-height: 100vh;
      }

      .page-wrapper {
        width: min(1100px, 90%);
        margin: 0 auto;
        padding: 40px 0 70px;
      }

      .hero {
        text-align: center;
        padding: 70px 20px 45px;
      }

      .hero h1 {
        margin: 0;
        font-size: clamp(2.5rem, 6vw, 4.5rem);
        letter-spacing: 4px;
      }

      .hero p {
        max-width: 650px;
        margin: 18px auto 0;
        color: #cbd5e1;
        font-size: 1.1rem;
        line-height: 1.6;
      }

      nav {
        display: flex;
        justify-content: center;
        margin-bottom: 55px;
      }

      .Menu {
        position: relative;
      }

      .dropdown-btn {
        background: rgba(255, 255, 255, 0.12);
        color: #f8fafc;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 999px;
        padding: 13px 24px;
        cursor: pointer;
        backdrop-filter: blur(10px);
        font-size: 0.95rem;
        transition: transform 0.25s ease, background 0.25s ease;
      }

      .dropdown-btn:hover {
        transform: translateY(-2px);
        background: rgba(255, 255, 255, 0.2);
      }

      .dropdown-list {
        list-style: none;
        padding: 10px;
        margin: 12px 0 0;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        min-width: 190px;
        background: rgba(15, 23, 42, 0.95);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 18px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
        display: none;
        z-index: 10;
      }

      .Menu:hover .dropdown-list {
        display: block;
      }

      .dropdown-list li a {
        display: block;
        color: #e2e8f0;
        text-decoration: none;
        padding: 11px 14px;
        border-radius: 12px;
        transition: background 0.2s ease;
      }

      .dropdown-list li a:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      .about-card {
        max-width: 760px;
        margin: 0 auto 28px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 24px;
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.25);
        padding: 34px;
        text-align: center;
      }

      .about-card h2 {
        margin: 0 0 12px;
        font-size: 1.8rem;
      }

      .about-card p {
        margin: 0;
        color: #cbd5e1;
        font-size: 1.05rem;
        line-height: 1.6;
      }

      .link-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 22px;
      }

      .link-card {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 24px;
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.25);
        transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
      }

      .link-card:hover {
        transform: translateY(-8px);
        background: rgba(255, 255, 255, 0.12);
        box-shadow: 0 28px 60px rgba(0, 0, 0, 0.35);
      }

      .link-card a {
        display: block;
        color: #f8fafc;
        text-decoration: none;
        padding: 28px;
      }

      .link-card span {
        display: block;
        color: #93c5fd;
        font-size: 0.9rem;
        margin-bottom: 10px;
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      .link-card strong {
        display: block;
        font-size: 1.15rem;
        line-height: 1.5;
      }

      @media (max-width: 600px) {
        .hero {
          padding-top: 45px;
        }

        .about-card {
          padding: 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-wrapper">
      <section class="hero">
        <h1>About Me</h1>
        <p>Learn more about my background, my work, and why I would be a strong fit for future opportunities.</p>
      </section>

      <nav>
        <!-- Dropdown button -->
        <div class="Menu">
          <button class="dropdown-btn">Explore Website</button>
          <ul class="dropdown-list">
            <li><a href="index.html">Main</a></li>
            <li><a href="AboutMe.html">About me</a></li>
            <li><a href="Projects.html">Projects</a></li>
            <li><a href="HowToContactMe.html">Contact</a></li>
          </ul>
        </div>
      </nav>

      <section class="about-card">
        <h2>Explore my profile</h2>
        <p>Check my resume and blog below.</p>
      </section>

      <section class="link-grid">

        <div class="link-card">
          <a href="MyResume.html">
            <span>Experience</span>
            <strong>My Resume</strong>
          </a>
        </div>

        <div class="link-card">
          <a href="blog.html">
            <span>Writing</span>
            <strong>Blog</strong>
          </a>
        </div>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
